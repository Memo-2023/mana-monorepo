      MANA_CORE_AUTH_URL: http://mana-auth:3001
      CORS_ORIGINS: https://todo.mana.how,https://mana.how
    ports:
      - "3031:3031"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3031/health"]
