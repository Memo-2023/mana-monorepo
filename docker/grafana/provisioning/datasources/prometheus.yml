# Grafana Datasource Provisioning
# Auto-configures VictoriaMetrics as the default datasource
# VictoriaMetrics is 100% Prometheus-compatible, using same type

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://victoriametrics:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      httpMethod: POST

  # Business Metrics API (DuckDB via mana-auth)
  - name: Business Metrics
    type: yesoreyeram-infinity-datasource
    access: proxy
    url: http://mana-auth:3001
    isDefault: false
    editable: true
    jsonData:
      datasource_mode: "basic"
