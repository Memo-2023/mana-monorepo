packages:
  # Development tools
  - 'tools/*'

  # Product applications (root level)
  - 'apps/*'

  # Sub-apps within products (mobile, web, landing, backend)
  - 'apps/*/apps/*'

  # Product-specific packages
  - 'apps/*/packages/*'

  # Games
  - 'games/*'

  # Sub-apps within games (if needed)
  - 'games/*/apps/*'

  # Game-specific packages
  - 'games/*/packages/*'

  # Standalone microservices
  - 'services/*'

  # Monorepo-wide shared packages
  - 'packages/*'

  # Archived apps (excluded from workspace, available for future use)
  # To re-activate: move app back to apps/ folder
  # - 'apps-archived/*'
  # - 'apps-archived/*/apps/*'
  # - 'apps-archived/*/packages/*'
