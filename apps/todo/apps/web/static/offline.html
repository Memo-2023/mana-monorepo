<!DOCTYPE html>
<html lang="de">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Offline - Todo</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
			background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%);
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 1rem;
		}

		@media (prefers-color-scheme: dark) {
			body {
				background: linear-gradient(135deg, #1e1b2e 0%, #2d2640 100%);
				color: #f3f4f6;
			}
		}

		.container {
			text-align: center;
			max-width: 400px;
			padding: 2rem;
			background: rgba(255, 255, 255, 0.9);
			border-radius: 1.5rem;
			box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
			backdrop-filter: blur(20px);
		}

		@media (prefers-color-scheme: dark) {
			.container {
				background: rgba(30, 27, 46, 0.9);
				border: 1px solid rgba(255, 255, 255, 0.1);
			}
		}

		.icon {
			width: 80px;
			height: 80px;
			margin: 0 auto 1.5rem;
			background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
			border-radius: 1rem;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.icon svg {
			width: 48px;
			height: 48px;
			color: white;
		}

		h1 {
			font-size: 1.5rem;
			font-weight: 600;
			color: #1f2937;
			margin-bottom: 0.75rem;
		}

		@media (prefers-color-scheme: dark) {
			h1 {
				color: #f3f4f6;
			}
		}

		p {
			color: #6b7280;
			margin-bottom: 1.5rem;
			line-height: 1.6;
		}

		@media (prefers-color-scheme: dark) {
			p {
				color: #9ca3af;
			}
		}

		.status {
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 0.5rem;
			padding: 0.75rem 1rem;
			background: rgba(239, 68, 68, 0.1);
			border-radius: 9999px;
			color: #ef4444;
			font-size: 0.875rem;
			margin-bottom: 1.5rem;
		}

		.status-dot {
			width: 8px;
			height: 8px;
			background: #ef4444;
			border-radius: 50%;
			animation: pulse 2s infinite;
		}

		@keyframes pulse {
			0%, 100% { opacity: 1; }
			50% { opacity: 0.5; }
		}

		button {
			display: inline-flex;
			align-items: center;
			gap: 0.5rem;
			padding: 0.75rem 1.5rem;
			background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
			color: white;
			border: none;
			border-radius: 9999px;
			font-size: 0.875rem;
			font-weight: 500;
			cursor: pointer;
			transition: transform 0.15s, box-shadow 0.15s;
		}

		button:hover {
			transform: translateY(-2px);
			box-shadow: 0 10px 20px -10px rgba(139, 92, 246, 0.5);
		}

		button:active {
			transform: translateY(0);
		}

		.tips {
			margin-top: 2rem;
			padding-top: 1.5rem;
			border-top: 1px solid rgba(0, 0, 0, 0.1);
			text-align: left;
		}

		@media (prefers-color-scheme: dark) {
			.tips {
				border-top-color: rgba(255, 255, 255, 0.1);
			}
		}

		.tips h2 {
			font-size: 0.75rem;
			text-transform: uppercase;
			letter-spacing: 0.05em;
			color: #9ca3af;
			margin-bottom: 0.75rem;
		}

		.tips ul {
			list-style: none;
			font-size: 0.875rem;
			color: #6b7280;
		}

		@media (prefers-color-scheme: dark) {
			.tips ul {
				color: #9ca3af;
			}
		}

		.tips li {
			display: flex;
			align-items: center;
			gap: 0.5rem;
			margin-bottom: 0.5rem;
		}

		.tips li::before {
			content: '•';
			color: #8b5cf6;
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="icon">
			<svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
				<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
					d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-2.83m-1.414 5.658a9 9 0 01-2.167-9.238m7.824 2.167a1 1 0 111.414 1.414m-1.414-1.414L3 3m8.293 8.293l1.414 1.414" />
			</svg>
		</div>

		<h1>Du bist offline</h1>
		<p>Keine Internetverbindung. Sobald du wieder online bist, kannst du deine Aufgaben verwalten.</p>

		<div class="status">
			<span class="status-dot"></span>
			<span>Verbindung wird gesucht...</span>
		</div>

		<button onclick="location.reload()">
			<svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
				<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
					d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
			</svg>
			Erneut versuchen
		</button>

		<div class="tips">
			<h2>Was du tun kannst</h2>
			<ul>
				<li>Überprüfe deine WLAN-Verbindung</li>
				<li>Prüfe deine mobilen Daten</li>
				<li>Versuche es in einigen Sekunden erneut</li>
			</ul>
		</div>
	</div>

	<script>
		// Automatisch neu laden, wenn wieder online
		window.addEventListener('online', () => {
			location.reload();
		});
	</script>
</body>
</html>
