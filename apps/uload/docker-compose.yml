# =============================================================================
# uload Docker Compose - Local Development
# =============================================================================
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose up -d postgres     # Start only PostgreSQL
#   docker compose logs -f            # Follow logs
#   docker compose down               # Stop all services
#   docker compose down -v            # Stop and remove volumes
#
# Connection strings for local development:
#   DATABASE_URL=postgresql://uload:uload_dev_password_123@localhost:5432/uload_dev
#   REDIS_URL=redis://localhost:6379
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: uload-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: uload_dev
      POSTGRES_USER: uload
      POSTGRES_PASSWORD: ${DB_PASSWORD:-uload_dev_password_123}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uload -d uload_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uload-network

  # ---------------------------------------------------------------------------
  # Redis Cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: uload-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uload-network

  # ---------------------------------------------------------------------------
  # pgAdmin (Database GUI)
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: uload-pgadmin-dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@localhost
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - uload-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  uload-network:
    driver: bridge
