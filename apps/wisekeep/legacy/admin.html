<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Transcriber - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }
        
        .header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            padding: 1.5rem;
        }
        
        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #60a5fa;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        
        .stat-label {
            color: #94a3b8;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .quick-action {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        
        .quick-action h2 {
            margin-bottom: 1rem;
            color: #cbd5e1;
        }
        
        .input-group {
            display: flex;
            gap: 1rem;
        }
        
        input {
            flex: 1;
            padding: 0.75rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 1rem;
        }
        
        input:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
        }
        
        select {
            padding: 0.75rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 1rem;
            cursor: pointer;
        }
        
        button {
            padding: 0.75rem 2rem;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .jobs-list {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 12px;
            padding: 2rem;
        }
        
        .job-item {
            background: rgba(15, 23, 42, 0.4);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .job-status {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        
        .status-completed {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }
        
        .status-processing {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }
        
        .status-failed {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }
        
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(96, 165, 250, 0.3);
            border-radius: 50%;
            border-top-color: #60a5fa;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .nav-links {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
        }
        
        .nav-links a {
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .nav-links a:hover {
            color: #60a5fa;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <h1>🎥 YouTube Transcriber - Admin Dashboard</h1>
            <div class="nav-links">
                <a href="http://localhost:4321">→ Public Website</a>
                <a href="http://localhost:8000/docs">→ API Docs</a>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="total-transcripts">-</div>
                <div class="stat-label">Transkripte</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="active-jobs">-</div>
                <div class="stat-label">Aktive Jobs</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-size">-</div>
                <div class="stat-label">Speicher (MB)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="playlists-count">-</div>
                <div class="stat-label">Playlists</div>
            </div>
        </div>
        
        <div class="quick-action">
            <h2>🚀 Neue Transkription starten</h2>
            <div class="input-group">
                <input type="text" id="url-input" placeholder="YouTube URL eingeben...">
                <select id="model-select">
                    <option value="tiny">Tiny (Schnell)</option>
                    <option value="base" selected>Base</option>
                    <option value="small">Small</option>
                    <option value="medium">Medium</option>
                    <option value="large">Large (Beste Qualität)</option>
                </select>
                <select id="language-select">
                    <option value="de" selected>Deutsch</option>
                    <option value="en">English</option>
                </select>
                <button onclick="startTranscription()">Transkribieren</button>
            </div>
        </div>
        
        <div class="jobs-list">
            <h2 style="margin-bottom: 1rem;">📋 Aktuelle Jobs</h2>
            <div id="jobs-container">
                <div class="job-item">
                    <span style="color: #94a3b8;">Keine aktiven Jobs</span>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:8000';
        
        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}/api/stats`);
                const data = await response.json();
                
                document.getElementById('total-transcripts').textContent = data.total_transcripts || '0';
                document.getElementById('active-jobs').textContent = data.active_jobs || '0';
                document.getElementById('total-size').textContent = data.total_size_mb?.toFixed(1) || '0';
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        async function loadPlaylists() {
            try {
                const response = await fetch(`${API_URL}/api/playlists`);
                const data = await response.json();
                document.getElementById('playlists-count').textContent = data.length || '0';
            } catch (error) {
                console.error('Error loading playlists:', error);
            }
        }
        
        async function loadJobs() {
            try {
                const response = await fetch(`${API_URL}/api/jobs`);
                const jobs = await response.json();
                
                const container = document.getElementById('jobs-container');
                if (jobs.length === 0) {
                    container.innerHTML = '<div class="job-item"><span style="color: #94a3b8;">Keine aktiven Jobs</span></div>';
                } else {
                    container.innerHTML = jobs.map(job => `
                        <div class="job-item">
                            <div>
                                <div style="font-weight: 600; margin-bottom: 0.25rem;">${job.url}</div>
                                <div style="color: #94a3b8; font-size: 0.875rem;">
                                    ${new Date(job.created_at).toLocaleString('de-DE')}
                                </div>
                            </div>
                            <span class="job-status status-${job.status}">
                                ${job.status === 'transcribing' ? '<span class="loader"></span>' : ''}
                                ${job.status.toUpperCase()}
                            </span>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading jobs:', error);
            }
        }
        
        async function startTranscription() {
            const url = document.getElementById('url-input').value;
            const model = document.getElementById('model-select').value;
            const language = document.getElementById('language-select').value;
            
            if (!url) {
                alert('Bitte YouTube URL eingeben');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/api/transcribe`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url, model, language })
                });
                
                if (response.ok) {
                    document.getElementById('url-input').value = '';
                    alert('Transkription gestartet!');
                    loadStats();
                    loadJobs();
                } else {
                    alert('Fehler beim Starten der Transkription');
                }
            } catch (error) {
                console.error('Error starting transcription:', error);
                alert('Fehler: API nicht erreichbar');
            }
        }
        
        // Initial load
        loadStats();
        loadPlaylists();
        loadJobs();
        
        // Refresh every 5 seconds
        setInterval(() => {
            loadStats();
            loadJobs();
        }, 5000);
    </script>
</body>
</html>
