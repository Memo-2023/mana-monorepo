<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="bridge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Bridge symbol (Manalink = bridge) -->
  <g fill="url(#bridge)">
    <!-- Left pillar -->
    <rect x="100" y="180" width="40" height="180" rx="8"/>
    <!-- Right pillar -->
    <rect x="372" y="180" width="40" height="180" rx="8"/>
    <!-- Arch -->
    <path d="M100 240 Q256 80 412 240 L412 200 Q256 40 100 200 Z"/>
    <!-- Deck -->
    <rect x="100" y="280" width="312" height="32" rx="4"/>
    <!-- Connection dots -->
    <circle cx="180" cy="296" r="12"/>
    <circle cx="256" cy="296" r="12"/>
    <circle cx="332" cy="296" r="12"/>
  </g>
</svg>
